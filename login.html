<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>سكولار — تسجيل الدخول</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
<style>
  svg{display:block;}
  .ico{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;vertical-align:middle;}
  .ico-lg{width:26px;height:26px;}

  :root{--indigo:#0F766E;--indigo-d:#0B5A53;--violet:#10A99B;--mint:#F59E0B;--ink:#0E1020;--body:#3A3D52;--muted:#7A7E96;--faint:#A9ADC4;--wash:#F1F5F3;--font:"Tajawal",system-ui,sans-serif;
    --sh-sm:0 0 0 1px rgba(20,22,55,.05),0 1px 2px rgba(20,22,55,.04);--sh-glow:0 10px 30px -8px rgba(15,118,110,.45);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);height:100vh;display:flex;overflow:hidden;color:var(--ink);background:#F7F9F8;-webkit-font-smoothing:antialiased;letter-spacing:-.005em;}
  .brandside{flex:1;position:relative;overflow:hidden;padding:56px;display:flex;flex-direction:column;justify-content:space-between;
    background:linear-gradient(140deg,#0F766E 0%,#0E8378 45%,#F59E0B 130%);color:#fff;}
  .brandside::before{content:"";position:absolute;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.2),transparent 70%);top:-180px;left:-160px;}
  .brandside::after{content:"";position:absolute;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.13),transparent 70%);bottom:-160px;right:-120px;}
  .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.07) 1px,transparent 1px);background-size:46px 46px;mask:radial-gradient(circle at 70% 35%,#000,transparent 75%);}
  .bs-top{display:flex;align-items:center;gap:14px;position:relative;z-index:2;}
  .bs-logo{width:52px;height:52px;border-radius:16px;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);display:grid;place-items:center;font-size:26px;border:1px solid rgba(255,255,255,.25);}
  .bs-top b{font-size:23px;font-weight:900;}.bs-top small{display:block;opacity:.85;font-size:12.5px;font-weight:700;}
  .bs-mid{position:relative;z-index:2;max-width:500px;}
  .bs-mid h1{font-size:46px;font-weight:900;line-height:1.16;letter-spacing:-.03em;}
  .bs-mid p{font-size:17px;opacity:.94;margin-top:18px;line-height:1.7;font-weight:500;}
  .glasscard{position:relative;z-index:2;background:rgba(255,255,255,.12);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.22);border-radius:22px;padding:22px;display:flex;gap:30px;max-width:520px;}
  .glasscard .stat b{font-size:30px;font-weight:900;display:block;}.glasscard .stat span{font-size:12.5px;opacity:.88;font-weight:600;}
  .formside{width:480px;flex:0 0 480px;background:#fff;display:flex;align-items:center;justify-content:center;padding:48px;box-shadow:-20px 0 60px -30px rgba(20,22,55,.2);}
  .form{width:100%;max-width:340px;}
  .form h2{font-size:28px;font-weight:900;letter-spacing:-.02em;}.form .lead{color:var(--muted);font-size:15px;font-weight:500;margin-top:8px;margin-bottom:30px;}
  .field{margin-bottom:18px;}.field label{display:block;font-size:13.5px;font-weight:700;margin-bottom:8px;}
  .field .inp{display:flex;align-items:center;gap:10px;border-radius:13px;padding:13px 15px;transition:.2s;background:var(--wash);box-shadow:inset 0 0 0 1px rgba(20,22,55,.06);}
  .field .inp:focus-within{box-shadow:inset 0 0 0 1.5px var(--indigo),0 0 0 4px rgba(15,118,110,.12);background:#fff;}
  .field .inp span{color:var(--faint);font-size:16px;}
  .field input{border:0;outline:0;width:100%;font-family:var(--font);font-size:15px;font-weight:500;color:var(--ink);background:transparent;text-align:right;}
  .rowflex{display:flex;align-items:center;justify-content:space-between;margin:6px 0 26px;font-size:13.5px;font-weight:600;}
  .rowflex label{display:flex;align-items:center;gap:8px;color:var(--body);cursor:pointer;}.rowflex a{color:var(--indigo);font-weight:700;}
  .submit{width:100%;border:0;cursor:pointer;font-family:var(--font);font-weight:900;font-size:16px;color:#fff;padding:15px;border-radius:14px;background:linear-gradient(135deg,#0F766E,#10A99B);box-shadow:var(--sh-glow);transition:.2s;}
  .submit:hover{transform:translateY(-2px);filter:brightness(1.05);}
  .divider{display:flex;align-items:center;gap:12px;color:var(--faint);font-size:13px;font-weight:600;margin:24px 0;}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(20,22,55,.08);}
  .sso{display:flex;gap:12px;}
  .sso button{flex:1;border:0;background:#fff;color:var(--body);border-radius:12px;padding:12px;font-family:var(--font);font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;box-shadow:var(--sh-sm);}
  .sso button:hover{transform:translateY(-2px);}
  .foot{text-align:center;margin-top:28px;font-size:14px;color:var(--muted);font-weight:500;}.foot a{color:var(--indigo);font-weight:700;}
  .roletabs{display:flex;gap:8px;margin-bottom:24px;}
  .roletabs button{flex:1;border:0;cursor:pointer;font-family:var(--font);font-weight:800;font-size:13.5px;color:var(--muted);
    background:var(--wash);border-radius:12px;padding:12px 6px;transition:.18s;display:flex;flex-direction:column;align-items:center;gap:5px;box-shadow:inset 0 0 0 1px rgba(20,22,55,.05);}
  .roletabs button .ric{font-size:18px;}
  .roletabs button:hover{color:var(--body);}
  .roletabs button.on{background:#fff;color:var(--indigo-d);box-shadow:inset 0 0 0 1.5px var(--indigo),0 6px 16px -6px rgba(15,118,110,.35);}
  @media(max-width:900px){.brandside{display:none;}.formside{flex:1;width:auto;box-shadow:none;}}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="i-cap" viewBox="0 0 24 24"><path d="M3 9l9-5 9 5-9 5-9-5z"/><path d="M21 9v5"/><path d="M7 11v4c0 1 2.5 2.5 5 2.5s5-1.5 5-2.5v-4"/></symbol>
  <symbol id="i-grid" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></symbol>
  <symbol id="i-users" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/><path d="M16 5.5a3 3 0 010 5.6"/><path d="M19 19c0-2.2-1-3.8-2.5-4.6"/></symbol>
  <symbol id="i-cal" viewBox="0 0 24 24"><rect x="3.5" y="5" width="17" height="16" rx="2.5"/><path d="M3.5 9.5h17M8 3v3M16 3v3"/></symbol>
  <symbol id="i-teacher" viewBox="0 0 24 24"><circle cx="12" cy="7" r="3.2"/><path d="M5.5 20c0-3.6 2.9-6 6.5-6s6.5 2.4 6.5 6"/></symbol>
  <symbol id="i-building" viewBox="0 0 24 24"><path d="M4 21V6l8-3 8 3v15"/><path d="M4 21h16M9 21v-4h6v4M8 9h2M14 9h2M8 13h2M14 13h2"/></symbol>
  <symbol id="i-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2"/></symbol>
  <symbol id="i-card" viewBox="0 0 24 24"><rect x="3" y="5.5" width="18" height="13" rx="2.5"/><path d="M3 10h18M6.5 15h4"/></symbol>
  <symbol id="i-mega" viewBox="0 0 24 24"><path d="M4 10v4l9 4V6l-9 4z"/><path d="M13 7.5a4 4 0 010 9"/><path d="M6 14v3.5a1.5 1.5 0 003 0V15"/></symbol>
  <symbol id="i-doc" viewBox="0 0 24 24"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4M9 12h6M9 16h6"/></symbol>
  <symbol id="i-bell" viewBox="0 0 24 24"><path d="M6 9a6 6 0 1112 0c0 5 2 6 2 6H4s2-1 2-6z"/><path d="M10.5 19a1.5 1.5 0 003 0"/></symbol>
  <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></symbol>
  <symbol id="i-logout" viewBox="0 0 24 24"><path d="M14 4h4a1 1 0 011 1v14a1 1 0 01-1 1h-4"/><path d="M3 12h11M7 8l-4 4 4 4"/></symbol>
  <symbol id="i-spark" viewBox="0 0 24 24"><path d="M12 3l1.8 4.8L19 9.5l-4.2 2.7L13 17l-1-4.8L7 9.5l4.2-1.7z"/></symbol>
  <symbol id="i-up" viewBox="0 0 24 24"><path d="M5 14l7-7 7 7"/></symbol>
  <symbol id="i-down" viewBox="0 0 24 24"><path d="M5 10l7 7 7-7"/></symbol>
  <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24"><path d="M5 12l5 5 9-10"/></symbol>
  <symbol id="i-bus" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="12" rx="2.5"/><path d="M3 11h18M7 17v2M17 17v2"/><circle cx="8" cy="17" r="1"/><circle cx="16" cy="17" r="1"/></symbol>
  <symbol id="i-trophy" viewBox="0 0 24 24"><path d="M7 4h10v4a5 5 0 01-10 0V4z"/><path d="M7 6H4v2a3 3 0 003 3M17 6h3v2a3 3 0 01-3 3M9 16h6M10 20h4M12 13v3"/></symbol>
  <symbol id="i-tray" viewBox="0 0 24 24"><path d="M12 4v10M8 11l4 4 4-4"/><path d="M5 19h14"/></symbol>
  <symbol id="i-chart" viewBox="0 0 24 24"><path d="M4 19V5M4 19h16M8 16v-4M12 16V8M16 16v-6"/></symbol>
</svg>
  <section class="brandside">
    <div class="grid-bg"></div>
    <div class="bs-top"><div class="bs-logo"><svg class="ico ico-lg"><use href="#i-cap"/></svg></div><div><b>سكولار</b><small>نظام متابعة الطلاب</small></div></div>
    <div class="bs-mid"><h1>الطريقة العصرية لإدارة مدرستك بالكامل.</h1><p>الدرجات، الحضور، الاختبارات، الرسوم وتواصل أولياء الأمور — كل ذلك في منصة واحدة أنيقة تحبها مدرستك.</p></div>
    <div></div>
  </section>
  <section class="formside">
    <div class="form">
      <h2>مرحبًا بعودتك 👋</h2>
      <p class="lead">اختر نوع الحساب لتسجيل الدخول</p>
      <div class="roletabs" id="roletabs">
        <button class="on" data-role="admin" data-target="index.html" data-email="admin@alnoor.edu"><span class="ric"><svg class="ico ico-lg"><use href="#i-building"/></svg></span> مدير</button>
        <button data-role="teacher" data-target="teacher.html" data-email="sarah@alnoor.edu"><span class="ric"><svg class="ico"><use href="#i-teacher"/></svg></span> معلم</button>
        <button data-role="student" data-target="student-portal.html" data-email="ahmed@alnoor.edu"><span class="ric"><svg class="ico ico-lg"><use href="#i-cap"/></svg></span> طالب</button>
      </div>
      <div class="field"><label>البريد الإلكتروني</label><div class="inp"><span><svg class="ico"><use href="#i-doc"/></svg></span><input id="emailInput" type="email" value="admin@alnoor.edu" /></div></div>
      <div class="field"><label>كلمة المرور</label><div class="inp"><span><svg class="ico"><use href="#i-card"/></svg></span><input type="password" value="••••••••" /></div></div>
      <div class="rowflex"><label><input type="checkbox" checked /> تذكّرني</label><a href="#">نسيت كلمة المرور؟</a></div>
      <a id="loginGo" href="index.html"><button class="submit" id="loginBtn">الدخول إلى لوحة الإدارة ←</button></a>
    </div>
  </section>
<script>
  (function(){
    var labels={admin:'الدخول إلى لوحة الإدارة ←',teacher:'الدخول إلى واجهة المعلم ←',student:'الدخول إلى بوابة الطالب ←'};
    var tabs=document.getElementById('roletabs');
    if(!tabs)return;
    var email=document.getElementById('emailInput');
    var btn=document.getElementById('loginBtn');
    var go=document.getElementById('loginGo');
    tabs.querySelectorAll('button').forEach(function(b){
      b.addEventListener('click',function(){
        tabs.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});
        b.classList.add('on');
        var role=b.getAttribute('data-role');
        if(email)email.value=b.getAttribute('data-email')||email.value;
        if(btn)btn.textContent=labels[role]||btn.textContent;
        if(go)go.setAttribute('href',b.getAttribute('data-target')||'index.html');
      });
    });
  })();
</script>
<script src="app.js?v=1"></script>
</body>
</html>
